<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Jörð — by · Refonte</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  /* =========================================
     TOKENS — reprise fidèle de l'ADN Jörð
     ========================================= */
  :root {
    --bg:           #0b1421;
    --bg-warm:      #0f1b2b;
    --bg-deep:      #080f19;
    --bg-panel:     #13203216;

    --surface:        rgba(180, 210, 255, 0.05);
    --surface-hover:  rgba(180, 210, 255, 0.09);
    --surface-strong: rgba(180, 210, 255, 0.08);

    --border:        rgba(180, 210, 255, 0.10);
    --border-strong: rgba(180, 210, 255, 0.18);
    --border-gold:   rgba(201, 169, 110, 0.28);

    --cream:        #f0e6d3;
    --cream-soft:   rgba(240, 230, 211, 0.68);
    --cream-muted:  rgba(240, 230, 211, 0.38);
    --cream-faint:  rgba(240, 230, 211, 0.18);

    --gold:         #d4b07a;
    --gold-deep:    #c9a46e;
    --gold-soft:    rgba(201, 169, 110, 0.10);
    --gold-glow:    rgba(201, 169, 110, 0.30);

    --serif: "Cormorant Garamond", Georgia, serif;
    --sans:  "Jost", -apple-system, system-ui, sans-serif;

    --ease:        cubic-bezier(.25,.46,.45,.94);
    --ease-out:    cubic-bezier(.16,1,.3,1);
    --ease-spring: cubic-bezier(.34,1.56,.64,1);

    --maxw: 1160px;
  }

  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-warm);
    color: var(--cream);
    font-family: var(--serif);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::after {
    content:"";
    position:fixed; inset:0; z-index:9999; pointer-events:none;
    opacity:.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  img, svg { display: block; max-width: 100%; }

  :focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  /* =========================================
     LAYOUT
     ========================================= */
  .section {
    position: relative;
    padding: clamp(5rem, 10vw, 8rem) 1.5rem;
    background: var(--bg-warm);
    z-index: 1;
  }
  .section-inner {
    max-width: var(--maxw);
    margin: 0 auto;
  }
  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-family: var(--sans);
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.4rem;
  }
  .section-tag::before {
    content: "";
    width: 28px;
    height: 1px;
    background: var(--gold);
    opacity: .55;
  }
  .section-heading {
    font-family: var(--serif);
    font-size: clamp(2rem, 4.3vw, 2.9rem);
    font-weight: 300;
    line-height: 1.2;
    letter-spacing: 0.005em;
    margin-bottom: 1.2rem;
    max-width: 620px;
    text-wrap: balance;
  }
  .section-heading em {
    font-style: italic;
    font-weight: 300;
    color: var(--cream-soft);
  }
  .section-intro {
    font-family: var(--serif);
    font-size: clamp(1rem, 1.3vw, 1.1rem);
    font-weight: 300;
    line-height: 1.75;
    color: var(--cream-soft);
    max-width: 560px;
    margin-bottom: 4rem;
    text-wrap: pretty;
  }

  /* =========================================
     DIVIDER
     ========================================= */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.5rem 0;
    background: var(--bg-warm);
    position: relative;
    z-index: 1;
  }
  .divider-line { width: 50px; height: 1px; background: var(--border); }
  .divider-dot  { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .55; }

  /* =========================================
     BUTTONS
     ========================================= */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .7rem;
    padding: 0.95rem 1.8rem;
    border-radius: 0;
    font-family: var(--sans);
    font-size: 0.77rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 1px solid transparent;
    transition:
      transform .45s var(--ease-spring),
      box-shadow .45s var(--ease),
      background .35s var(--ease),
      border-color .35s var(--ease),
      color .3s var(--ease);
  }
  .btn-primary {
    background: var(--gold);
    color: #1a1208;
    font-weight: 500;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px var(--gold-glow);
    background: #dcba86;
  }
  .btn-ghost {
    color: var(--cream);
    border-color: var(--cream-muted);
    background: transparent;
    font-weight: 300;
  }
  .btn-ghost:hover {
    transform: translateY(-2px);
    border-color: var(--cream-soft);
    background: rgba(255,255,255,0.025);
  }
  .btn-arrow::after {
    content: "→";
    transition: transform .4s var(--ease);
    font-size: .9rem;
    letter-spacing: 0;
  }
  .btn:hover.btn-arrow::after { transform: translateX(4px); }

  .link-underline {
    display: inline-flex;
    align-items: center;
    gap: .55rem;
    font-family: var(--sans);
    font-size: .72rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--cream);
    padding-bottom: 2px;
    border-bottom: 1px solid var(--gold-soft);
    transition: border-color .3s var(--ease), color .3s var(--ease);
  }
  .link-underline:hover { border-color: var(--gold); color: var(--cream); }
  .link-underline::after {
    content: "→";
    transition: transform .35s var(--ease);
  }
  .link-underline:hover::after { transform: translateX(4px); }

  /* =========================================
     NAVBAR
     ========================================= */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 900;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem clamp(1.25rem, 3vw, 2.5rem);
    transition:
      background .4s var(--ease),
      padding .4s var(--ease),
      border-color .4s var(--ease);
    border-bottom: 1px solid transparent;
  }
  .navbar--solid {
    background: rgba(13, 23, 38, 0.82);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom-color: var(--border);
    padding: 0.85rem clamp(1.25rem, 3vw, 2.5rem);
  }

  .navbar-brand {
    display: inline-flex;
    align-items: center;
    gap: .65rem;
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--cream);
  }
  .navbar-brand-mark {
    width: 22px; height: 22px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .navbar-brand-mark::after {
    content: "";
    width: 3px; height: 3px;
    background: var(--gold);
    border-radius: 50%;
  }

  .navbar-links {
    display: flex;
    list-style: none;
    gap: 2.4rem;
  }
  .navbar-links a {
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cream-soft);
    position: relative;
    padding: .3rem 0;
    transition: color .3s var(--ease);
  }
  .navbar-links a::after {
    content:""; position: absolute; bottom: 0; left: 0;
    width: 0; height: 1px; background: var(--gold);
    transition: width .4s var(--ease);
  }
  .navbar-links a:hover { color: var(--cream); }
  .navbar-links a:hover::after { width: 100%; }

  .navbar-cta {
    font-family: var(--sans);
    font-size: .7rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #1a1208;
    background: var(--gold);
    padding: .6rem 1.2rem;
    font-weight: 500;
    transition: transform .4s var(--ease-spring), background .3s var(--ease);
  }
  .navbar-cta:hover { transform: translateY(-1px); background: #dcba86; }

  .navbar-burger {
    display: none;
    flex-direction: column;
    gap: 5px;
    padding: 6px;
  }
  .navbar-burger span {
    display: block;
    width: 22px; height: 1px;
    background: var(--cream);
    transition: transform .35s var(--ease), opacity .3s var(--ease);
  }
  .navbar--menu-open .navbar-burger span:first-child { transform: translateY(6px) rotate(45deg); }
  .navbar--menu-open .navbar-burger span:nth-child(2) { opacity: 0; }
  .navbar--menu-open .navbar-burger span:last-child { transform: translateY(-6px) rotate(-45deg); }

  /* =========================================
     HERO
     ========================================= */
  .hero {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 7rem 1.5rem 6rem;
    overflow: hidden;
    isolation: isolate;
  }
  .hero-photo {
    position: absolute;
    inset: 0;
    z-index: -2;
    overflow: hidden;
  }
  .hero-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
    animation: kenBurns 28s ease-in-out infinite alternate;
  }
  .hero-photo::after {
    content:"";
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 35%, rgba(15,27,43,0.25) 0%, rgba(15,27,43,0.78) 62%),
      linear-gradient(to bottom, rgba(15,27,43,0.55) 0%, rgba(15,27,43,0.15) 25%, rgba(15,27,43,0.92) 95%);
  }
  @keyframes kenBurns {
    from { transform: scale(1.04); }
    to   { transform: scale(1.12); }
  }

  .hero-inner {
    max-width: var(--maxw);
    margin: 0 auto;
    width: 100%;
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap: 4rem;
    align-items: end;
  }
  .hero-inner--centered {
    grid-template-columns: 1fr;
    max-width: 720px;
  }

  .hero-kicker {
    display: inline-flex;
    align-items: center;
    gap: .7rem;
    font-family: var(--sans);
    font-size: .7rem;
    letter-spacing: .4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 1s var(--ease-out) .3s forwards;
  }
  .hero-kicker::before {
    content: "";
    width: 28px;
    height: 1px;
    background: var(--gold);
  }

  .hero-title {
    font-family: var(--serif);
    font-size: clamp(3.3rem, 8.5vw, 6.8rem);
    font-weight: 300;
    line-height: .98;
    letter-spacing: 0.01em;
    margin-bottom: 2.2rem;
    opacity: 0;
    animation: fadeUp 1.2s var(--ease-out) .5s forwards;
  }
  .hero-title em {
    font-style: italic;
    color: var(--cream-soft);
    font-weight: 300;
  }
  .hero-title small {
    display: block;
    font-size: clamp(1rem, 1.6vw, 1.3rem);
    font-style: italic;
    color: var(--gold);
    letter-spacing: .3em;
    text-transform: uppercase;
    font-family: var(--sans);
    font-weight: 300;
    margin-top: 1.8rem;
    opacity: .9;
  }

  .hero-lead {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(1.1rem, 1.5vw, 1.3rem);
    font-weight: 300;
    line-height: 1.65;
    color: var(--cream-soft);
    max-width: 460px;
    margin-bottom: 2.8rem;
    opacity: 0;
    animation: fadeUp 1.2s var(--ease-out) .75s forwards;
    text-wrap: pretty;
  }

  .hero-cta {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 1.2s var(--ease-out) 1s forwards;
  }

  .hero-meta {
    display: flex;
    flex-direction: column;
    gap: 2rem;
    padding-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 1.2s var(--ease-out) 1.25s forwards;
  }
  .hero-meta-block {
    padding-left: 1.3rem;
    border-left: 1px solid var(--gold-soft);
  }
  .hero-meta-label {
    font-family: var(--sans);
    font-size: .62rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--cream-muted);
    display: block;
    margin-bottom: .35rem;
  }
  .hero-meta-value {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--cream);
    line-height: 1.4;
  }
  .hero-meta-value em { font-style: italic; color: var(--cream-soft); }

  .scroll-cue {
    position: absolute;
    bottom: 1.8rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .6rem;
    opacity: 0;
    animation: fadeUp 1.5s var(--ease-out) 1.6s forwards;
  }
  .scroll-cue-text {
    font-family: var(--sans);
    font-size: .58rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--cream-muted);
  }
  .scroll-cue-line {
    width: 1px; height: 36px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollPulse 2.5s ease-in-out infinite;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scrollPulse {
    0%,100% { transform: scaleY(.7); opacity: .3; transform-origin: top; }
    50%     { transform: scaleY(1);  opacity: 1;  transform-origin: top; }
  }

  /* =========================================
     TRUST STRIP
     ========================================= */
  .trust-strip {
    background: var(--bg-deep);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem;
  }
  .trust-inner {
    max-width: var(--maxw);
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2rem;
    align-items: center;
  }
  .trust-item {
    text-align: center;
    padding: 0 1rem;
    position: relative;
  }
  .trust-item + .trust-item::before {
    content:"";
    position: absolute;
    left: 0;
    top: 10%; bottom: 10%;
    width: 1px;
    background: var(--border);
  }
  .trust-num {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    margin-bottom: .4rem;
  }
  .trust-num small {
    font-size: 1rem;
    color: var(--gold);
    opacity: .7;
  }
  .trust-label {
    font-family: var(--sans);
    font-size: .62rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--cream-muted);
  }

  /* =========================================
     OFFERS
     ========================================= */
  .offers-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2rem;
    align-items: end;
    margin-bottom: 4rem;
  }
  .offers-head .section-intro { margin-bottom: 0; }

  .offers-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }
  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2.5rem 2rem 2.2rem;
    transition:
      transform .55s var(--ease),
      background .4s var(--ease),
      border-color .45s var(--ease),
      box-shadow .55s var(--ease);
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .card:hover {
    transform: translateY(-6px);
    background: var(--surface-strong);
    border-color: var(--border-gold);
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
  }
  .card-head {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: .8rem;
  }
  .card-num {
    font-family: var(--sans);
    font-size: .65rem;
    letter-spacing: .2em;
    color: var(--gold);
  }
  .card-rule {
    flex: 1;
    height: 1px;
    background: var(--border);
    transition: background .45s var(--ease);
  }
  .card:hover .card-rule { background: var(--gold-soft); }

  .card-icon {
    width: 36px; height: 36px;
    margin-bottom: .2rem;
    stroke: var(--gold);
    stroke-width: 1;
    fill: none;
    opacity: .8;
  }
  .card-title {
    font-family: var(--serif);
    font-size: 1.32rem;
    font-weight: 400;
    line-height: 1.3;
    margin-bottom: .1rem;
  }
  .card-text {
    font-family: var(--serif);
    font-size: .98rem;
    font-weight: 300;
    line-height: 1.75;
    color: var(--cream-soft);
    text-wrap: pretty;
  }
  .card-more {
    margin-top: auto;
    padding-top: 1.2rem;
    font-family: var(--sans);
    font-size: .66rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: .7;
    display: inline-flex;
    gap: .5rem;
    transition: opacity .3s var(--ease), gap .3s var(--ease);
  }
  .card:hover .card-more { opacity: 1; gap: .8rem; }

  /* =========================================
     PROCESS
     ========================================= */
  .process-head { text-align: center; margin-bottom: 4.5rem; }
  .process-head .section-tag { margin-left: auto; margin-right: auto; justify-content: center; }
  .process-head .section-tag::before { display: none; }
  .process-head .section-heading { margin-left: auto; margin-right: auto; }
  .process-head .section-intro { margin-left: auto; margin-right: auto; }

  .process-steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2.5rem;
    position: relative;
    text-align: center;
  }
  .process-line {
    position: absolute;
    top: 32px;
    left: 16%;
    right: 16%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border-gold), transparent);
  }
  .process-step { position: relative; }
  .process-dot {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    background: var(--bg-warm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    margin-bottom: 1.8rem;
    transition: background .4s var(--ease), transform .45s var(--ease-spring);
  }
  .process-dot::before {
    content:"";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--gold-soft);
    opacity: 0;
    transition: opacity .4s var(--ease), inset .4s var(--ease);
  }
  .process-step:hover .process-dot { background: var(--gold-soft); transform: translateY(-3px); }
  .process-step:hover .process-dot::before { opacity: 1; inset: -10px; }
  .process-dot span {
    font-family: var(--sans);
    font-size: .7rem;
    letter-spacing: .1em;
    color: var(--gold);
  }
  .process-title {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 400;
    margin-bottom: .6rem;
  }
  .process-text {
    font-family: var(--serif);
    font-size: .95rem;
    font-weight: 300;
    line-height: 1.75;
    color: var(--cream-soft);
    max-width: 280px;
    margin: 0 auto;
    text-wrap: pretty;
  }
  .process-duration {
    display: inline-block;
    margin-top: 1rem;
    font-family: var(--sans);
    font-size: .6rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--cream-muted);
    padding: .3rem .7rem;
    border: 1px solid var(--border);
    border-radius: 999px;
  }

  /* =========================================
     ABOUT
     ========================================= */
  .about-grid {
    display: grid;
    grid-template-columns: 0.85fr 1.15fr;
    gap: 4rem;
    align-items: center;
  }
  .about-grid--single {
    grid-template-columns: 1fr;
    max-width: 720px;
    margin: 0 auto;
    text-align: left;
  }
  .about-portrait {
    position: relative;
    aspect-ratio: 4/5;
    overflow: hidden;
  }
  .about-portrait img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    transition: transform 1.2s var(--ease);
  }
  .about-portrait:hover img { transform: scale(1.04); }
  .about-portrait-frame {
    position: absolute;
    inset: 14px;
    border: 1px solid var(--gold-soft);
    pointer-events: none;
  }
  .about-body blockquote {
    font-family: var(--serif);
    font-size: clamp(1.05rem, 1.4vw, 1.2rem);
    font-weight: 300;
    line-height: 1.8;
    color: var(--cream);
    font-style: normal;
  }
  .about-body blockquote p { margin-bottom: 1.3rem; }
  .about-body blockquote p:last-of-type { margin-bottom: 2rem; }
  .about-body blockquote em {
    font-style: italic;
    color: var(--cream-soft);
  }
  .about-sig {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-top: 2rem;
  }
  .about-sig-line {
    width: 40px; height: 1px;
    background: var(--gold);
  }
  .about-sig-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--gold);
  }

  /* =========================================
     MAP / DESTINATIONS
     ========================================= */
  .dest { background: var(--bg-warm); }
  .dest-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2rem;
    align-items: end;
    margin-bottom: 3rem;
  }
  .dest-head .section-intro { margin-bottom: 0; }

  .dest-switch {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    background: var(--surface);
  }
  .dest-switch button {
    font-family: var(--sans);
    font-size: .65rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    padding: .6rem 1.1rem;
    border-radius: 999px;
    color: var(--cream-soft);
    transition: background .3s var(--ease), color .3s var(--ease);
  }
  .dest-switch button.active {
    background: var(--gold);
    color: #1a1208;
    font-weight: 500;
  }

  /* MAP — boussole / constellation */
  .dest-map-wrap {
    position: relative;
    background:
      radial-gradient(ellipse at 50% 45%, rgba(201,169,110,0.10), transparent 60%),
      linear-gradient(135deg, #0c1826 0%, #081320 100%);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .dest-map {
    position: relative;
    display: block;
    width: 100%;
    max-width: 620px;
    aspect-ratio: 1 / 1;
    margin: 2.2rem auto 1.6rem;
  }
  .dest-map svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  /* Rings and axes */
  .dest-map .graticule {
    fill: none;
    stroke: rgba(201,169,110,0.14);
    stroke-width: 0.18;
  }
  .dest-map .graticule--outer {
    stroke: rgba(201,169,110,0.24);
    stroke-width: 0.22;
  }
  .dest-map .graticule--axis {
    stroke: rgba(201,169,110,0.10);
    stroke-dasharray: 0.6 1.2;
  }
  .dest-map .graticule--tick {
    stroke: rgba(201,169,110,0.45);
    stroke-width: 0.35;
  }

  /* Routes — dashed by default, solid gold when active */
  .dest-map .route {
    stroke: rgba(201,169,110,0.22);
    stroke-width: 0.22;
    stroke-dasharray: 1 1.4;
    transition: stroke .45s var(--ease), stroke-width .45s var(--ease),
                stroke-dasharray .45s var(--ease), opacity .45s var(--ease);
  }
  .dest-map .route-hover {
    stroke: rgba(201,169,110,0.55);
    stroke-width: 0.32;
  }
  .dest-map .route-active {
    stroke: var(--gold);
    stroke-width: 0.55;
    stroke-dasharray: none;
    filter: drop-shadow(0 0 1.2px rgba(212,176,122,0.6));
  }
  .dest-map.has-active .route:not(.route-active):not(.route-hover) {
    opacity: 0.55;
  }

  /* Compass rose */
  .dest-map .compass-star {
    fill: var(--gold);
    opacity: 0.28;
  }
  .dest-map .compass-ring {
    fill: none;
    stroke: var(--gold);
    stroke-width: 0.3;
    opacity: 0.75;
  }
  .dest-map .compass-dot { fill: var(--gold); }
  .dest-map .compass-label {
    font-family: var(--sans);
    font-size: 2.3px;
    letter-spacing: 0.15px;
    text-anchor: middle;
    fill: var(--gold);
    opacity: 0.55;
  }
  .dest-map .compass-label--n { opacity: 0.9; }

  /* Pins */
  .dest-map-pin {
    position: absolute;
    transform: translate(-50%, -50%);
    display: inline-block;
    z-index: 3;
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    outline: none;
    line-height: 0;
  }
  .dest-map-pin:focus-visible .pin-dot {
    box-shadow: 0 0 0 3px rgba(10, 18, 30, 0.9),
                0 0 0 5px rgba(212, 176, 122, 0.7);
  }
  .dest-map-pin .pin-pulse {
    position: absolute;
    top: 0; left: 50%;
    transform: translate(-50%, -50%);
    width: 46px; height: 46px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.45), transparent 65%);
    animation: mapPulse 2.8s ease-in-out infinite;
    pointer-events: none;
    opacity: 0;
  }
  .dest-map-pin.active .pin-pulse { opacity: 1; }
  @keyframes mapPulse {
    0%,100% { opacity: .25; transform: translate(-50%, -50%) scale(0.55); }
    50%     { opacity: .85; transform: translate(-50%, -50%) scale(1.35); }
  }
  .dest-map-pin .pin-dot {
    display: block;
    position: relative;
    z-index: 1;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--cream);
    border: 1.5px solid var(--gold);
    box-shadow: 0 0 0 3px rgba(10, 18, 30, 0.95),
                0 2px 10px rgba(0,0,0,0.55);
    transition: width .3s var(--ease-spring), height .3s var(--ease-spring),
                background .3s var(--ease), transform .3s var(--ease-spring);
  }
  .dest-map-pin:hover .pin-dot {
    transform: scale(1.15);
    background: var(--gold);
  }
  .dest-map-pin.active .pin-dot {
    width: 15px; height: 15px;
    background: var(--gold);
    transform: scale(1.05);
  }

  .dest-map-pin .pin-label {
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    font-family: var(--sans);
    font-size: 0.58rem;
    line-height: 1;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--cream);
    background: rgba(8, 14, 22, 0.92);
    border: 1px solid var(--border);
    padding: 5px 10px;
    white-space: nowrap;
    opacity: 0;
    transform: translate(-50%, -4px);
    transition: opacity .3s var(--ease), transform .3s var(--ease),
                border-color .3s var(--ease), color .3s var(--ease);
    pointer-events: none;
    backdrop-filter: blur(6px);
  }
  .dest-map-pin:hover .pin-label,
  .dest-map-pin:focus-visible .pin-label,
  .dest-map-pin.active .pin-label {
    opacity: 1;
    transform: translate(-50%, 0);
  }
  .dest-map-pin.active .pin-label {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Legend (bottom-left) and active-destination hint (bottom-right) */
  .dest-map-legend,
  .dest-map-hint {
    position: absolute;
    bottom: 1.1rem;
    font-family: var(--sans);
    font-size: .55rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--cream-muted);
    display: flex;
    align-items: center;
    gap: .7rem;
    z-index: 3;
    pointer-events: none;
  }
  .dest-map-legend { left: 1.4rem; }
  .dest-map-legend::before {
    content: "";
    width: 24px; height: 1px;
    background: var(--gold-soft);
  }
  .dest-map-hint {
    right: 1.4rem;
    color: var(--cream-soft);
    transition: color .4s var(--ease);
  }
  .dest-map-hint::after {
    content: "";
    width: 24px; height: 1px;
    background: var(--gold-soft);
  }
  .dest-map.has-active .dest-map-hint { color: var(--gold); }
  .dest-map.has-active .dest-map-hint::after { background: var(--gold); }

  /* Custom cursor (restored from original Jörð) */
  .cursor-dot,
  .cursor-ring {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 10000;
    border-radius: 50%;
    will-change: transform;
  }
  .cursor-dot {
    width: 5px; height: 5px;
    margin: -2.5px 0 0 -2.5px;
    background: var(--gold);
  }
  .cursor-ring {
    width: 36px; height: 36px;
    margin: -18px 0 0 -18px;
    border: 1px solid var(--gold);
    opacity: 0.35;
    transition:
      width .35s var(--ease),
      height .35s var(--ease),
      margin .35s var(--ease),
      opacity .35s var(--ease),
      border-color .35s var(--ease);
  }
  .cursor-ring--hover {
    width: 56px; height: 56px;
    margin: -28px 0 0 -28px;
    opacity: 0.18;
    border-color: var(--cream);
  }
  @media (pointer: coarse) {
    .cursor-dot, .cursor-ring { display: none; }
  }
  @media (pointer: fine) {
    html, html * { cursor: none !important; }
  }

  .dest-panel {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-top: 1px solid var(--border);
    background: var(--bg-deep);
  }
  .dest-chip {
    padding: 1.2rem 1.5rem;
    text-align: left;
    border-right: 1px solid var(--border);
    transition: background .3s var(--ease);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: .3rem;
  }
  .dest-chip:last-child { border-right: none; }
  .dest-chip:hover, .dest-chip.active { background: var(--surface-strong); }
  .dest-chip-name {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--cream);
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .dest-chip-name::before {
    content:"";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: .5;
    transition: opacity .3s var(--ease), transform .3s var(--ease);
  }
  .dest-chip.active .dest-chip-name::before,
  .dest-chip:hover .dest-chip-name::before { opacity: 1; transform: scale(1.3); }
  .dest-chip-mood {
    font-family: var(--sans);
    font-size: .62rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--cream-muted);
    padding-left: 14px;
  }

  /* Destination detail card */
  .dest-detail {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    margin-top: 2rem;
    border: 1px solid var(--border);
    min-height: 420px;
  }
  .dest-detail-img {
    position: relative;
    overflow: hidden;
    background: #111;
  }
  .dest-detail-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: opacity .6s var(--ease);
  }
  .dest-detail-body {
    padding: 3rem 2.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: var(--bg-deep);
  }
  .dest-detail-mood {
    font-family: var(--sans);
    font-size: .65rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }
  .dest-detail-name {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 3vw, 2.3rem);
    font-weight: 300;
    margin-bottom: 1.4rem;
  }
  .dest-detail-text {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 300;
    line-height: 1.8;
    color: var(--cream-soft);
    margin-bottom: 2rem;
    text-wrap: pretty;
  }
  .dest-detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 1.8rem;
    padding: 1.5rem 0;
    border-top: 1px solid var(--border);
  }
  .dest-meta-item {
    font-family: var(--sans);
    font-size: .68rem;
  }
  .dest-meta-item b {
    display: block;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--cream-muted);
    font-weight: 400;
    margin-bottom: .3rem;
  }
  .dest-meta-item span {
    font-family: var(--serif);
    color: var(--cream);
    font-size: .95rem;
    font-weight: 400;
  }

  /* Grid view alt */
  .dest-grid-view {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.2rem;
  }
  .dest-card {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    cursor: pointer;
  }
  .dest-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .8s var(--ease);
  }
  .dest-card:hover img { transform: scale(1.08); }
  .dest-card-caption {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: 1.5rem;
    background: linear-gradient(to top, rgba(10,18,30,0.92) 0%, rgba(10,18,30,0.1) 55%);
  }
  .dest-card-name {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 400;
    margin-bottom: .3rem;
  }
  .dest-card-mood {
    font-family: var(--sans);
    font-size: .62rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* =========================================
     PRICING
     ========================================= */
  .pricing-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2rem;
    align-items: end;
    margin-bottom: 4rem;
  }
  .pricing-head .section-intro { margin-bottom: 0; }

  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
  }
  .pricing-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem 1.6rem 1.8rem;
    display: flex;
    flex-direction: column;
    gap: .9rem;
    transition:
      transform .5s var(--ease),
      background .4s var(--ease),
      border-color .4s var(--ease),
      box-shadow .5s var(--ease);
    position: relative;
  }
  .pricing-card:hover {
    transform: translateY(-5px);
    border-color: var(--border-gold);
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
  }
  .pricing-card--highlight {
    border-color: rgba(201,169,110,.35);
    background: rgba(201,169,110,0.045);
  }
  .pricing-card--highlight::before {
    content: "Signature";
    position: absolute;
    top: -10px; left: 1.5rem;
    background: var(--gold);
    color: #1a1208;
    font-family: var(--sans);
    font-size: .58rem;
    font-weight: 500;
    letter-spacing: .25em;
    text-transform: uppercase;
    padding: .3rem .7rem;
  }
  .pricing-name {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 400;
    margin-bottom: .05rem;
  }
  .pricing-price {
    font-family: var(--serif);
    font-size: 1.7rem;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    margin-top: .3rem;
  }
  .pricing-price small {
    font-size: .85rem;
    color: var(--cream-muted);
    font-style: italic;
  }
  .pricing-tag {
    font-family: var(--sans);
    font-size: .58rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--cream-muted);
    padding-bottom: .9rem;
    border-bottom: 1px solid var(--border);
  }
  .pricing-desc {
    font-family: var(--serif);
    font-size: .92rem;
    font-weight: 300;
    line-height: 1.7;
    color: var(--cream-soft);
    text-wrap: pretty;
  }
  .pricing-services {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: .4rem;
    margin-top: .2rem;
  }
  .pricing-services li {
    font-family: var(--sans);
    font-size: .72rem;
    font-weight: 300;
    color: var(--cream-soft);
    padding-left: 1.1rem;
    position: relative;
  }
  .pricing-services li::before {
    content:"—";
    position: absolute; left: 0;
    color: var(--gold); opacity: .7;
  }
  .pricing-note {
    font-family: var(--sans);
    font-size: .64rem;
    color: var(--cream-muted);
    font-style: italic;
    line-height: 1.55;
    border-top: 1px solid var(--border);
    padding-top: .8rem;
    margin-top: auto;
  }
  .pricing-cta {
    margin-top: auto;
    padding: .75rem 1.3rem;
    font-size: .68rem;
    align-self: flex-start;
  }

  /* =========================================
     BRIEF FORM (intelligent)
     ========================================= */
  .brief {
    background: var(--bg-deep);
    padding: clamp(5rem, 10vw, 8rem) 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .brief::before {
    content:"";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(201,169,110,0.08), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(201,169,110,0.04), transparent 50%);
    pointer-events: none;
  }
  .brief-inner {
    max-width: 920px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .brief-intro {
    text-align: center;
    margin-bottom: 3.5rem;
  }
  .brief-intro .section-tag {
    justify-content: center;
  }
  .brief-intro .section-tag::before,
  .brief-intro .section-tag::after {
    content: "";
    width: 28px;
    height: 1px;
    background: var(--gold);
    opacity: .55;
  }

  .brief-card {
    background: linear-gradient(180deg, rgba(180,210,255,0.035), rgba(180,210,255,0.015));
    border: 1px solid var(--border-strong);
    padding: clamp(2rem, 4vw, 3.5rem);
    position: relative;
  }
  .brief-progress {
    display: flex;
    align-items: center;
    gap: .6rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
  }
  .brief-step-indicator {
    display: flex;
    align-items: center;
    gap: .55rem;
    font-family: var(--sans);
    font-size: .62rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--cream-muted);
    transition: color .3s var(--ease);
    white-space: nowrap;
  }
  .brief-step-indicator.active { color: var(--gold); }
  .brief-step-indicator.done { color: var(--cream-soft); }
  .brief-step-num {
    width: 22px; height: 22px;
    border: 1px solid currentColor;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: .6rem;
    transition: background .3s var(--ease);
  }
  .brief-step-indicator.done .brief-step-num { background: var(--gold-soft); }
  .brief-step-sep {
    flex: 1;
    min-width: 10px;
    height: 1px;
    background: var(--border);
  }

  .brief-step {
    animation: briefIn .5s var(--ease-out);
  }
  @keyframes briefIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brief-q {
    font-family: var(--serif);
    font-size: clamp(1.5rem, 2.8vw, 2rem);
    font-weight: 300;
    line-height: 1.3;
    margin-bottom: .6rem;
    text-wrap: balance;
  }
  .brief-q em { font-style: italic; color: var(--cream-soft); }
  .brief-hint {
    font-family: var(--serif);
    font-size: 1rem;
    font-style: italic;
    color: var(--cream-soft);
    margin-bottom: 2rem;
  }

  .brief-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: .8rem;
    margin-bottom: 2rem;
  }
  .brief-option {
    padding: 1.3rem 1.4rem;
    background: var(--surface);
    border: 1px solid var(--border);
    text-align: left;
    cursor: pointer;
    transition:
      background .3s var(--ease),
      border-color .3s var(--ease),
      transform .3s var(--ease-spring);
    display: flex;
    flex-direction: column;
    gap: .3rem;
    position: relative;
  }
  .brief-option:hover {
    background: var(--surface-strong);
    border-color: var(--border-gold);
    transform: translateY(-2px);
  }
  .brief-option.selected {
    background: rgba(201,169,110,0.08);
    border-color: var(--gold);
  }
  .brief-option-label {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--cream);
  }
  .brief-option-sub {
    font-family: var(--sans);
    font-size: .66rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--cream-muted);
  }
  .brief-option-emoji {
    font-family: var(--serif);
    font-size: 1.3rem;
    color: var(--gold);
    margin-bottom: .3rem;
  }

  .brief-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.1rem 1.3rem;
    color: var(--cream);
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 300;
    transition: border-color .3s var(--ease), background .3s var(--ease);
    margin-bottom: 1rem;
  }
  .brief-input:focus {
    outline: none;
    border-color: var(--gold);
    background: var(--surface-strong);
  }
  .brief-input::placeholder {
    color: var(--cream-muted);
    font-style: italic;
  }
  textarea.brief-input {
    min-height: 140px;
    resize: vertical;
    line-height: 1.7;
  }

  .brief-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .brief-field-label {
    display: block;
    font-family: var(--sans);
    font-size: .62rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--cream-muted);
    margin-bottom: .5rem;
  }

  .brief-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
  }
  .brief-back {
    font-family: var(--sans);
    font-size: .7rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--cream-muted);
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    transition: color .3s var(--ease);
  }
  .brief-back:hover { color: var(--cream); }
  .brief-back:disabled { opacity: 0; pointer-events: none; }
  .brief-back::before {
    content: "←";
    transition: transform .3s var(--ease);
  }
  .brief-back:hover::before { transform: translateX(-3px); }

  .brief-submit {
    background: var(--gold);
    color: #1a1208;
    padding: 1rem 2.2rem;
    font-family: var(--sans);
    font-size: .72rem;
    font-weight: 500;
    letter-spacing: .2em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: .7rem;
    transition: transform .4s var(--ease-spring), box-shadow .4s var(--ease);
  }
  .brief-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--gold-glow); }
  .brief-submit:disabled { opacity: .4; pointer-events: none; }
  .brief-submit::after { content: "→"; transition: transform .4s var(--ease); }
  .brief-submit:hover::after { transform: translateX(4px); }

  .brief-summary {
    text-align: center;
    padding: 1rem 0;
  }
  .brief-summary-icon {
    width: 54px; height: 54px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
    color: var(--gold);
    font-size: 1.4rem;
  }
  .brief-summary h3 {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 3vw, 2.3rem);
    font-weight: 300;
    margin-bottom: 1rem;
  }
  .brief-summary h3 em { font-style: italic; color: var(--gold); }
  .brief-summary p {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.75;
    color: var(--cream-soft);
    max-width: 520px;
    margin: 0 auto 2rem;
    text-wrap: pretty;
  }
  .brief-recap {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    padding: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 2rem;
    text-align: left;
  }
  .brief-recap-item b {
    display: block;
    font-family: var(--sans);
    font-size: .58rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--cream-muted);
    font-weight: 400;
    margin-bottom: .3rem;
  }
  .brief-recap-item span {
    font-family: var(--serif);
    font-size: 1rem;
    color: var(--cream);
    font-weight: 400;
  }

  /* =========================================
     FAQ
     ========================================= */
  .faq-head { margin-bottom: 2.5rem; }

  .faq-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .faq-tab {
    font-family: var(--sans);
    font-size: .72rem;
    font-weight: 400;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--cream-soft);
    padding: 1rem 1.6rem;
    position: relative;
    transition: color .3s var(--ease);
  }
  .faq-tab::after {
    content:"";
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: center;
    transition: transform .4s var(--ease);
  }
  .faq-tab:hover { color: var(--cream); }
  .faq-tab.active { color: var(--gold); }
  .faq-tab.active::after { transform: scaleX(1); }

  .faq-list { display: flex; flex-direction: column; }
  .faq-item {
    border-bottom: 1px solid var(--border);
    transition: background .3s var(--ease);
  }
  .faq-item:hover { background: var(--surface); }
  .faq-question {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    padding: 1.6rem 0.2rem;
    text-align: left;
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.4;
  }
  .faq-icon {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border: 1px solid var(--gold-soft);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 300;
    transition: background .3s var(--ease), transform .4s var(--ease-spring);
  }
  .faq-item.open .faq-icon {
    background: var(--gold-soft);
    transform: rotate(180deg);
  }
  .faq-answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height .5s var(--ease);
  }
  .faq-item.open .faq-answer { max-height: 400px; }
  .faq-answer p {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 300;
    line-height: 1.8;
    color: var(--cream-soft);
    padding: 0 0 1.5rem;
    max-width: 720px;
    text-wrap: pretty;
  }

  /* =========================================
     CONTACT
     ========================================= */
  .contact { text-align: center; }
  .contact .section-tag { justify-content: center; }
  .contact .section-tag::before, .contact .section-tag::after {
    content: ""; width: 28px; height: 1px; background: var(--gold); opacity: .55;
  }
  .contact .section-heading { margin-left: auto; margin-right: auto; }
  .contact-text {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 300;
    font-style: italic;
    line-height: 1.8;
    color: var(--cream-soft);
    max-width: 520px;
    margin: 0 auto 2.5rem;
    text-wrap: pretty;
  }
  .contact-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .contact-channels {
    display: flex;
    justify-content: center;
    gap: 3rem;
    margin-top: 4rem;
    padding-top: 3rem;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .contact-channel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .4rem;
  }
  .contact-channel-label {
    font-family: var(--sans);
    font-size: .6rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--cream-muted);
  }
  .contact-channel-value {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--cream);
    font-style: italic;
    transition: color .3s var(--ease);
  }
  .contact-channel:hover .contact-channel-value { color: var(--gold); }

  /* =========================================
     FOOTER
     ========================================= */
  .footer {
    background: var(--bg-deep);
    padding: 4rem 1.5rem 2.5rem;
    border-top: 1px solid var(--border);
  }
  .footer-inner {
    max-width: var(--maxw);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 3rem;
    margin-bottom: 3rem;
  }
  .footer-brand {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: .04em;
    margin-bottom: 1rem;
    display: inline-flex;
    align-items: center;
    gap: .7rem;
  }
  .footer-tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: .95rem;
    color: var(--cream-soft);
    max-width: 280px;
    line-height: 1.7;
  }
  .footer-col h4 {
    font-family: var(--sans);
    font-size: .62rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.1rem;
    font-weight: 400;
  }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: .6rem; }
  .footer-col a {
    font-family: var(--serif);
    font-size: .95rem;
    font-weight: 300;
    color: var(--cream-soft);
    transition: color .3s var(--ease);
  }
  .footer-col a:hover { color: var(--gold); }
  .footer-bottom {
    max-width: var(--maxw);
    margin: 0 auto;
    padding-top: 1.8rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--sans);
    font-size: .65rem;
    letter-spacing: .15em;
    color: var(--cream-muted);
    flex-wrap: wrap;
    gap: 1rem;
  }

  /* =========================================
     REVEAL
     ========================================= */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity .9s var(--ease-out), transform .9s var(--ease-out);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* =========================================
     INTRO — surface d'eau (WebGL shader)
     ========================================= */
  .intro {
    position: fixed;
    inset: 0;
    z-index: 10001;
    background: #070d18;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 1.2s var(--ease-out);
    overflow: hidden;
    isolation: isolate;
  }
  .intro--out {
    opacity: 0;
    pointer-events: none;
  }

  .intro-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Soft vignette to focus attention at the center of the surface */
  .intro-vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 0%, transparent 35%, rgba(7,13,24,0.55) 100%);
    mix-blend-mode: multiply;
  }

  /* Falling drop — descends from above and squashes at impact */
  .intro-falling-drop {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 10px;
    height: 16px;
    margin-left: -5px;
    margin-top: -8px;
    z-index: 2;
    pointer-events: none;
    background: linear-gradient(180deg,
      rgba(240,230,211,0.05) 0%,
      rgba(240,230,211,0.55) 35%,
      rgba(212,176,122,0.95) 75%,
      #f0e6d3 100%);
    border-radius: 60% 60% 65% 65% / 80% 80% 30% 30%;
    filter: blur(.3px) drop-shadow(0 0 12px rgba(212,176,122,0.55));
    transform: translate(0, -55vh) scale(0.5, 1);
    opacity: 0;
    animation: introDropFall 500ms cubic-bezier(.4, 0, .65, 1) forwards;
  }
  @keyframes introDropFall {
    0%   { transform: translate(0, -55vh) scale(0.5, 1);   opacity: 0; }
    15%  { opacity: 1; }
    88%  { transform: translate(0, -3vh)  scale(0.95, 1.4); opacity: 1; }
    100% { transform: translate(0, 0)     scale(2.4, 0.6);  opacity: 0; }
  }

  /* Brief radial flash at the moment of impact */
  .intro-flash {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 8px;
    height: 8px;
    margin: -4px 0 0 -4px;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(circle,
      rgba(240,230,211,1) 0%,
      rgba(212,176,122,0.6) 25%,
      rgba(212,176,122,0.18) 55%,
      transparent 75%);
    border-radius: 50%;
    transform: scale(0);
    opacity: 0;
    animation: introFlash 1100ms cubic-bezier(.16,1,.3,1) 500ms forwards;
  }
  @keyframes introFlash {
    0%   { transform: scale(0);   opacity: 0; }
    4%   { transform: scale(8);   opacity: 0.95; }
    35%  { transform: scale(80);  opacity: 0.4; }
    100% { transform: scale(220); opacity: 0; }
  }

  .intro-center {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .9rem;
    pointer-events: none;
    text-shadow: 0 2px 24px rgba(0,0,0,0.4);
  }

  .intro-wordmark {
    position: relative;
    display: inline-block;
    line-height: 1;
  }

  .intro-mark {
    font-family: var(--serif);
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    letter-spacing: 0.04em;
    white-space: nowrap;
    opacity: 0;
    animation: introMark 1.5s var(--ease-out) 0.95s forwards;
  }
  @keyframes introMark {
    0%   { opacity: 0; letter-spacing: 0.4em; filter: blur(5px); transform: translateY(10px); }
    40%  { opacity: 1; letter-spacing: 0.04em; filter: blur(0); transform: translateY(0); }
    100% { opacity: 1; }
  }

  .intro-sub {
    position: absolute;
    right: -0.3em;
    bottom: -1.4em;
    font-family: var(--sans);
    font-size: 0.62rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0;
    transform: translateY(6px);
    animation: introSub 0.8s var(--ease-out) 1.35s forwards;
    pointer-events: none;
  }
  @keyframes introSub {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 0.9; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .intro { display: none; }
  }

  /* =========================================
     RESPONSIVE
     ========================================= */
  @media (max-width: 980px) {
    .hero-inner { grid-template-columns: 1fr; gap: 2.5rem; }
    .hero-meta { flex-direction: row; }
    .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
    .pricing-grid { grid-template-columns: repeat(2, 1fr); }
    .dest-detail { grid-template-columns: 1fr; }
    .dest-detail-img { aspect-ratio: 4/3; }
    .footer-inner { grid-template-columns: 1fr 1fr; gap: 2.5rem; }
    .trust-inner { grid-template-columns: repeat(2, 1fr); gap: 2rem 1rem; }
    .trust-item + .trust-item::before { display: none; }
    .offers-head, .dest-head, .pricing-head { grid-template-columns: 1fr; align-items: start; }
    .dest-switch { justify-self: start; width: fit-content; }
    .dest-map { max-width: 480px; margin: 1.8rem auto 1.2rem; }
  }

  @media (max-width: 720px) {
    .navbar-links, .navbar-cta { display: none; }
    .navbar-burger { display: flex; }
    .navbar--menu-open .navbar-links {
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 64px; left: 0; right: 0;
      background: rgba(13, 23, 38, 0.98);
      backdrop-filter: blur(20px);
      padding: 2rem;
      gap: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .navbar--menu-open .navbar-cta {
      display: inline-flex;
      position: fixed;
      top: calc(64px + 340px); left: 2rem; right: 2rem;
      justify-content: center;
    }

    .offers-grid,
    .process-steps,
    .dest-grid-view,
    .dest-panel { grid-template-columns: 1fr; }
    .process-line { display: none; }
    .process-steps { gap: 3rem; }

    .dest-panel { border-top: none; }
    .dest-chip { border-right: none; border-bottom: 1px solid var(--border); }
    .dest-map { max-width: 340px; margin: 1.4rem auto 1rem; }
    .dest-map-pin .pin-label { font-size: .55rem; padding: 3px 6px; letter-spacing: .2em; }
    .dest-map-legend, .dest-map-hint { font-size: .5rem; letter-spacing: .2em; }
    .dest-map-legend { left: .9rem; bottom: .7rem; }
    .dest-map-hint { right: .9rem; bottom: .7rem; }

    .pricing-grid { grid-template-columns: 1fr; }
    .brief-row { grid-template-columns: 1fr; }
    .brief-progress { display: none; }

    .hero { padding: 6rem 1.25rem 5rem; }
    .hero-meta { flex-direction: column; gap: 1.5rem; }

    .footer-inner { grid-template-columns: 1fr; gap: 2rem; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app.jsx"></script>

</body>
</html>
